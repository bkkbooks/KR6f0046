body:
  text: 毗耶娑問經翻譯之記菩薩方便攝化衆生必以大悲引邪從正毗耶娑仙即其人也為導群迷令識因果將諸異見至如來所歸命咨啓聽聞正法因其請説即以名經故因此部毗耶娑問魏尚書令儀同高公愍諸錯習示其歸則簡集能人善辭義者在宅上面出此經典正求法人沙門曇林婆羅門客瞿曇流支興和四年歲次壬戌月建在申朔次乙丑建初辛巳甲午畢功凡有一萬四千四百五十七字
