body:
  text: 毘耶娑問經翻譯之記菩薩方便攝化眾生必以大悲引邪從正毘耶娑仙即其人也為導群迷令識因果將諸異見至如來所歸命諮啟聽聞正法因其請說即以名經故因此部毘耶娑問魏尚書令儀同高公愍諸錯習示其歸則簡集能人善辭義者在宅上面出此經典正求法人沙門曇林婆羅門客瞿曇流支興和四年歲次壬戌月建在申朔次乙丑建初辛巳甲午畢功凡有一萬四千四百五十七字
